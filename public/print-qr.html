<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Print QR Codes — IITians Curious Minds</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Nunito:wght@700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      --yellow: #FFD000;
      --text: #1A1A1A;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f0f0f0;
      font-family: 'Poppins', sans-serif;
    }

    /* ── Screen UI ── */
    @media screen {
      .screen-bar {
        background: #1A1A1A;
        color: #fff;
        padding: 16px 32px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .screen-bar h2 { font-size: 16px; font-weight: 700; }
      .screen-bar p  { font-size: 12px; opacity: 0.6; margin-top: 2px; }

      .print-btn {
        background: var(--yellow);
        color: var(--text);
        border: none;
        padding: 12px 24px;
        border-radius: 10px;
        font-family: 'Poppins', sans-serif;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .print-btn:hover { background: #e6b800; }

      .pages-wrap {
        padding: 32px;
        display: flex;
        flex-direction: column;
        gap: 32px;
        align-items: center;
      }
    }

    /* ── Page (A4 sheet) ── */
    .page {
      background: #fff;
      width: 210mm;
      padding: 14mm 12mm;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 3px solid var(--yellow);
      padding-bottom: 10px;
      margin-bottom: 14px;
    }

    .page-header img { height: 36px; }

    .page-header .page-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      text-align: right;
    }

    .page-header .page-title span {
      display: block;
      font-size: 10px;
      color: #888;
      font-weight: 600;
    }

    /* ── QR Grid ── */
    .qr-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    /* ── Individual QR sticker ── */
    .qr-item {
      border: 1.5px solid #ddd;
      border-radius: 10px;
      padding: 8px 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      background: #fff;
    }

    .qr-item .card-label {
      font-family: 'Poppins', sans-serif;
      font-size: 9px;
      font-weight: 700;
      color: #555;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .qr-item .qr-holder {
      width: 72px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .qr-item .qr-holder canvas,
    .qr-item .qr-holder img {
      width: 72px !important;
      height: 72px !important;
    }

    .qr-item .url-text {
      font-size: 7px;
      color: #aaa;
      text-align: center;
      word-break: break-all;
      line-height: 1.3;
    }

    /* ── Print styles ── */
    @media print {
      body { background: #fff; }
      .screen-bar { display: none; }
      .pages-wrap { padding: 0; gap: 0; }

      .page {
        box-shadow: none;
        page-break-after: always;
        width: 100%;
        padding: 12mm 10mm;
      }

      .page:last-child { page-break-after: avoid; }

      @page {
        size: A4;
        margin: 0;
      }
    }
  </style>
</head>
<body>

<div class="screen-bar">
  <div>
    <h2>🖨️ Printable QR Code Sheet</h2>
    <p>All 39 QR codes, ready to cut and paste on physical cards</p>
  </div>
  <button class="print-btn" onclick="window.print()">🖨️ Print Now</button>
</div>

<div class="pages-wrap" id="pages"></div>

<script>
  const TOTAL = 39;
  const PER_PAGE = 20; // 4 columns × 5 rows
  const BASE_URL = window.location.origin;

  const pagesEl = document.getElementById('pages');

  // Split into pages of PER_PAGE
  let cardIdx = 1;
  let pageNum = 1;

  while (cardIdx <= TOTAL) {
    const page = document.createElement('div');
    page.className = 'page';

    page.innerHTML = `
      <div class="page-header">
        <img src="logo.png" alt="IITians Curious Minds" />
        <div class="page-title">
          QR Code Sheet — Page ${pageNum}
          <span>cards.iitianscuriousminds.com</span>
        </div>
      </div>
      <div class="qr-grid" id="page-grid-${pageNum}"></div>
    `;

    pagesEl.appendChild(page);
    const grid = document.getElementById(`page-grid-${pageNum}`);

    for (let j = 0; j < PER_PAGE && cardIdx <= TOTAL; j++, cardIdx++) {
      const id = cardIdx;
      const answerURL = `${BASE_URL}/answer/${id}`;

      const item = document.createElement('div');
      item.className = 'qr-item';
      item.innerHTML = `
        <div class="card-label">Card #${id}</div>
        <div class="qr-holder" id="pqr-${id}"></div>
        <div class="url-text">/answer/${id}</div>
      `;
      grid.appendChild(item);

      setTimeout(() => {
        new QRCode(document.getElementById(`pqr-${id}`), {
          text: answerURL,
          width: 72,
          height: 72,
          colorDark: '#000000',
          colorLight: '#ffffff',
          correctLevel: QRCode.CorrectLevel.M
        });
      }, 0);
    }

    pageNum++;
  }
</script>
</body>
</html>
